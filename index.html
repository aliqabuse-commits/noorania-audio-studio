<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    غرفة العمليات الصوتية V3
  </title>

  <meta name="theme-color" content="#111827">

  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="style.css">

  <script src="https://unpkg.com/wavesurfer.js@7"></script>

  <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>

</head>

<body>

  <!-- شريط النسخة -->
  <div id="check-version"
       style="
         background:#7f1d1d;
         color:white;
         text-align:center;
         padding:12px;
         font-size:22px;
         font-weight:bold;
         border-bottom:4px solid #facc15;
       ">

    🧠 COMMON PAYLOAD FINDER V903

  </div>


  <!-- رأس التطبيق -->
  <header class="app-header">

    <h1>
      🔬 غرفة العمليات الصوتية
    </h1>

    <p>
      النورانية العالمية — مختبر الجينوم الصوتي
    </p>

  </header>


  <main>

    <!-- الصفحة الرئيسية -->
    <section id="homeView" class="panel">

      <h2>
        القوائم الرئيسية
      </h2>

      <div id="categoryList"></div>

    </section>


    <!-- غرفة العمليات -->
    <section id="recordView"
             class="panel"
             style="display:none;">

      <div class="unit-card">

        <!-- الوحدة الحالية -->
        <div id="unit">
          بَ
        </div>

        <!-- اسم الملف -->
        <p id="filename">
          ba_fatha.wav
        </p>


        <!-- الموجة -->
        <div id="waveform-container"
             style="
               background:#000;
               border-radius:12px;
               margin:10px 0;
               border:1px solid #374151;
               min-height:120px;
               overflow:hidden;
             ">

          <div id="waveform"></div>

        </div>


        <!-- عرض الإحداثيات -->
        <div id="coords-display"
             style="
               display:grid;
               grid-template-columns:1fr 1fr 1fr;
               gap:6px;
               font-size:12px;
               color:#9ca3af;
               margin:8px 0;
             ">

          <div class="coord-box">

            بداية الحامل:
            <span id="val-x"
                  style="color:#00f2ff;">
              0.00
            </span>

          </div>

          <div class="coord-box">

            طول المحمول:
            <span id="val-y"
                  style="color:#00f2ff;">
              0.00
            </span>

          </div>

          <div class="coord-box">

            طول الذيل:
            <span id="val-z"
                  style="color:#00f2ff;">
              0.00
            </span>

          </div>

        </div>


        <!-- العداد -->
        <p id="counter">
          1 / 6
        </p>

      </div>


      <!-- أدوات التحكم -->
      <div class="controls">

        <!-- تسجيل -->
        <button id="recordBtn"
                onclick="toggleRecording()">

          🎙 تسجيل

        </button>


        <!-- تشغيل التسجيل -->
        <button onclick="playRaw()">

          ▶ استماع التسجيل

        </button>


        <!-- تشغيل المحمول -->
        <button onclick="playPayloadOnly()">

          ▶ المحمول فقط

        </button>


        <!-- كاشف المحمول -->
        <button onclick="runBaCommonPayloadTest()">

          🧠 اكتشاف باء مشتركة

        </button>


        <!-- اعتماد -->
        <button class="approve"
                onclick="approveAndNext()">

          ✅ اعتماد وحفظ

        </button>


        <!-- السابق -->
        <button onclick="prevUnit()">

          ⬅ السابق

        </button>


        <!-- اللاحق -->
        <button onclick="nextUnit()">

          التالي ➡

        </button>

      </div>


      <!-- أدوات ثانوية -->
      <div class="secondary-controls">

        <!-- الرئيسية -->
        <button onclick="goHome()">

          🏠 الرئيسية

        </button>


        <!-- التصدير -->
        <button onclick="exportApproved()">

          📦 تصدير

        </button>

      </div>


      <hr>


      <!-- قائمة الوحدات -->
      <h3>
        قائمة الوحدات
      </h3>

      <div id="unitList"></div>

    </section>

  </main>


  <!-- JSZip -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>


  <!-- ملفات النظام -->
  <script src="recording-manifest.js?v=903"></script>

  <script src="storage.js?v=903"></script>

  <script src="audio-lab.js?v=903"></script>

  <script src="common-payload-finder.js?v=903"></script>

  <script src="app.js?v=903"></script>


  <!-- تنظيف الكاش القديم -->
  <script>

    if ("serviceWorker" in navigator) {

      navigator.serviceWorker
        .getRegistrations()
        .then(function (registrations) {

          registrations.forEach(function (registration) {
            registration.unregister();
          });

        });

    }

    if ("caches" in window) {

      caches.keys().then(function (names) {

        names.forEach(function (name) {
          caches.delete(name);
        });

      });

    }

  </script>

</body>
</html>
