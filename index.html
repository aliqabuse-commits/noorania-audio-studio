<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>غرفة العمليات الصوتية V910 - مختبر الحقائب الإدراكية</title>

  <meta name="theme-color" content="#111827">

  <link rel="stylesheet" href="style.css">

  <script src="https://unpkg.com/wavesurfer.js@7"></script>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/spectrogram.min.js"></script>
</head>

<body>

  <div id="check-version"
       style="
         background:#14532d;
         color:white;
         text-align:center;
         padding:14px;
         font-size:20px;
         font-weight:bold;
         border-bottom:5px solid #facc15;
       ">
    🧠 V910 — Noorani Cognitive Phoneme Lab
  </div>

  <header class="app-header">
    <h1>🔬 غرفة العمليات الصوتية</h1>
    <p>النورانية العالمية — مختبر الحقائب الإدراكية والجينوم المركزي</p>
  </header>

  <main>

    <section id="homeView" class="panel">

      <h2>القوائم الرئيسية</h2>

      <button
        onclick="openPerceptualTrainingView()"
        style="display:block;margin:10px auto;width:90%;"
      >
        🧠 مختبر الحقائب الإدراكية
      </button>

      <div id="categoryList"></div>

    </section>


    <section
      id="perceptualTrainingView"
      class="panel"
      style="display:none;"
    >

      <h2>🧠 مختبر الحقائب الإدراكية</h2>

      <p>
        تدريب الحروف، بناء الذاكرة، بناء الجينوم، واختبار الفصل الجماعي.
      </p>

      <div id="phonemeCardsGrid"></div>

      <div
        id="training-rec-status"
        style="
          margin-top:12px;
          background:#111827;
          color:#00F2FF;
          padding:10px;
          border-radius:10px;
          font-size:14px;
          display:none;
          text-align:center;
          line-height:1.7;
        "
      ></div>

      <div
        id="training-success-message"
        style="
          display:none;
          background:#111827;
          color:#22c55e;
          padding:10px;
          border-radius:10px;
          margin:12px 0;
          line-height:1.8;
          text-align:center;
        "
      ></div>

      <button onclick="closePerceptualTrainingView()">
        🏠 العودة للرئيسية
      </button>

    </section>


    <section id="recordView" class="panel" style="display:none;">

      <div class="unit-card">

        <div id="unit">بَ</div>

        <p id="filename">ba_fatha.wav</p>

        <div
          id="analysis-shell"
          style="
            background:#000;
            border-radius:14px;
            margin:12px 0;
            padding:10px;
            border:1px solid #374151;
          "
        >

          <div
            id="waveform-container"
            style="
              background:#050505;
              border-radius:10px;
              border:1px solid #111827;
              overflow:auto;
              min-height:140px;
            "
          >
            <div id="waveform" style="min-height:140px;"></div>
          </div>

          <div
            id="spectrogram-container"
            style="
              background:#050505;
              border-radius:10px;
              border:1px solid #111827;
              margin-top:8px;
              overflow:auto;
              min-height:220px;
            "
          >
            <div id="spectrogram" style="min-height:220px;"></div>
          </div>

        </div>

        <p id="counter">1 / 6</p>

      </div>

      <div class="controls" style="gap:6px;">

        <button id="recordBtn" onclick="toggleRecording()">
          🎙 تسجيل
        </button>

        <button onclick="playRaw()">
          ▶ استماع التسجيل
        </button>

        <button onclick="approveAndNext()">
          ✅ اعتماد وحفظ
        </button>

        <button onclick="prevUnit()">
          ⬅ السابق
        </button>

        <button onclick="nextUnit()">
          ➡ اللاحق
        </button>

      </div>

      <div class="secondary-controls">

        <button onclick="goHome()">
          🏠 الرئيسية
        </button>

        <button onclick="exportApproved()">
          📦 تصدير
        </button>

      </div>

      <hr>

      <h3>قائمة الوحدات</h3>

      <div id="unitList"></div>

    </section>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script src="recording-manifest.js"></script>
  <script src="storage.js"></script>
  <script src="audio-lab.js"></script>

  <script src="phoneme-colors.js"></script>

  <script src="phoneme-training-pack.js"></script>
  <script src="phoneme-color-memory.js"></script>

  <script src="training-recorder.js"></script>
  <script src="phoneme-memory-trainer.js"></script>

  <script src="phoneme-cognitive-engine.js"></script>
  <script src="phoneme-match-engine.js"></script>

  <script src="app.js"></script>


  <script>

    function openPerceptualTrainingView() {
      document.getElementById("homeView").style.display = "none";
      document.getElementById("recordView").style.display = "none";
      document.getElementById("perceptualTrainingView").style.display = "block";

      renderPhonemeCards();

      if (typeof renderMatchResultsLog === "function") {
        renderMatchResultsLog();
      }
    }


    function closePerceptualTrainingView() {
      document.getElementById("perceptualTrainingView").style.display = "none";
      document.getElementById("recordView").style.display = "none";
      document.getElementById("homeView").style.display = "block";
    }


    function testPhonemeColorBinding(phonemeKey) {
      if (typeof bindPhonemeToColor !== "function") {
        alert("دالة bindPhonemeToColor غير موجودة");
        return;
      }

      const result = bindPhonemeToColor(phonemeKey);

      if (!result) {
        alert("فشل ربط الحرف باللون: " + phonemeKey);
        return;
      }

      alert(
        "الحرف: " + result.letter + "\n" +
        "اللون: " + result.colorName + "\n" +
        "HEX: " + result.hex
      );
    }


    function renderPhonemeCards() {
      const grid = document.getElementById("phonemeCardsGrid");

      if (!grid) return;

      grid.innerHTML = "";

      if (typeof getAllPhonemeTrainingPacks !== "function") {
        grid.innerHTML = `
          <div style="
            background:#7f1d1d;
            color:white;
            padding:14px;
            border-radius:12px;
            line-height:1.8;
          ">
            ⚠️ لم يتم العثور على دالة getAllPhonemeTrainingPacks.
            <br>
            راجع ملف phoneme-training-pack.js.
          </div>
        `;
        return;
      }

      const packs = getAllPhonemeTrainingPacks();

      if (!packs || !Object.keys(packs).length) {
        grid.innerHTML = `
          <div style="
            background:#7f1d1d;
            color:white;
            padding:14px;
            border-radius:12px;
            line-height:1.8;
          ">
            ⚠️ لا توجد حقائب إدراكية جاهزة.
            <br>
            يجب إنشاء الحروف داخل ملف phoneme-training-pack.js.
          </div>
        `;
        return;
      }

      Object.keys(packs).forEach(function (key) {
        const pack = packs[key];

        const card = document.createElement("div");

        card.style.background = "#08111f";
        card.style.color = "white";
        card.style.border = "1px solid " + (pack.colorHex || "#334155");
        card.style.borderRadius = "14px";
        card.style.padding = "14px";
        card.style.margin = "14px 0";

        card.innerHTML = `
          <h3 style="
            margin-top:0;
            color:${pack.colorHex || "#38bdf8"};
          ">
            ${pack.letter || key} — حقيبة ${pack.name || key}
          </h3>

          <p>
            اللون الإدراكي:
            <b style="color:${pack.colorHex || "#38bdf8"};">
              ${pack.colorName || "غير محدد"}
            </b>
          </p>

          <p style="font-size:13px;color:#cbd5e1;">
            المفتاح البرمجي:
            <b>${key}</b>
          </p>

          <div style="
            display:flex;
            flex-wrap:wrap;
            gap:8px;
          ">

            <button onclick="startPerceptualTraining('${key}')">
              🎙 تدريب
            </button>

            <button onclick="testPhonemeColorBinding('${key}')">
              🎨 اللون
            </button>

            <button onclick="trainPhonemeMemory('${key}')">
              🧠 الذاكرة
            </button>

            <button onclick="buildPhonemeCognitiveIdentity('${key}')">
              🧬 الجينوم
            </button>

            <button onclick="startPhonemeMatchTest('${key}')">
              🎯 اختبار
            </button>

          </div>
        `;

        grid.appendChild(card);
      });
    }

  </script>

</body>
</html>
